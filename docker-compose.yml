version: "3.9"

services:

  mysql:
    image: mysql:8

    container_name: fyde_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: fydeuser
      MYSQL_PASSWORD: fydepass
      MYSQL_DATABASE: fydejarvis

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: